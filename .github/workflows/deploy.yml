name: Deploy Drupal Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Tailscale
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscaled &
          sleep 5

      # 3. Connect to Tailnet
      - name: Connect to Tailnet
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          sudo tailscale up --authkey=${TAILSCALE_AUTHKEY} --hostname=github-runner --timeout=30s
          tailscale status

      # 4. Set up SSH and wait for the Tailscale tunnel to become usable.
      #    We don't gate on ICMP ping (unreliable over Tailscale); SSH is the only
      #    thing the deploy needs, so the SSH retry loop below is the single gate.
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOMELAB_SSH_KEY }}
          SSH_USER: ${{ secrets.HOMELAB_SSH_USER }}
          SSH_HOST: ${{ secrets.HOMELAB_TAILSCALE_IP }}
        run: |
          echo "🔧 Setting up SSH connection..."
          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          echo "🔍 Scanning for host keys (timeout: 10s)..."
          if timeout 10 ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "✅ Host key scan successful"
          else
            echo "⚠️  Host key scan failed, adding host to known_hosts with StrictHostKeyChecking=no"
            echo "Host $SSH_HOST" >> ~/.ssh/config
            echo "  StrictHostKeyChecking no" >> ~/.ssh/config
            echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config
          fi
          
          echo "🧪 Testing SSH connection (retries while the tunnel warms up)..."
          ssh_ok=false
          for i in $(seq 1 12); do
            if ssh -o ConnectTimeout=10 -o BatchMode=yes $SSH_USER@$SSH_HOST 'echo "SSH connection successful"'; then
              ssh_ok=true
              break
            fi
            echo "⏳ SSH not ready yet ($i/12), retrying in 5s..."
            sleep 5
          done
          if [ "$ssh_ok" != true ]; then
            echo "❌ SSH connection test failed after retries"
            echo "SSH config:"
            cat ~/.ssh/config || echo "No SSH config found"
            exit 1
          fi

          echo "✅ SSH key setup complete"

      # 5. Copy code to host
      - name: Copy Drupal code
        timeout-minutes: 5
        run: |
          echo "🚀 Copying Drupal code to homelab..."
          rsync -az --timeout=300 --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'web/sites/default/files' \
            ./ ${{ secrets.HOMELAB_SSH_USER }}@${{ secrets.HOMELAB_TAILSCALE_IP }}:/home/${{ secrets.HOMELAB_SSH_USER }}/drupal-deploy

      # 6. Deploy Drupal via Docker Compose
      - name: Deploy Drupal
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          DRUPAL_HASH_SALT: ${{ secrets.DRUPAL_HASH_SALT }}
        with:
          host: ${{ secrets.HOMELAB_TAILSCALE_IP }}
          username: ${{ secrets.HOMELAB_SSH_USER }}
          key: ${{ secrets.HOMELAB_SSH_KEY }}
          timeout: 15m
          envs: DB_NAME,DB_USER,DB_PASSWORD,DB_ROOT_PASSWORD,DRUPAL_HASH_SALT

          script: |
            cd ~/drupal-deploy
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh

      # 6. Clean up Tailscale session
      - name: Disconnect Tailscale
        if: always()
        run: |
          echo "🧹 Cleaning up Tailscale..."
          sudo tailscale logout || true
          sudo tailscale down || true
          echo "✅ Tailscale session ended."
